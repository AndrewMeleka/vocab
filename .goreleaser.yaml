# GoReleaser configuration for vocab.
# Docs: https://goreleaser.com
#
# Local dry-run:   goreleaser release --snapshot --clean
# Real release:    git tag v0.1.0 && git push origin v0.1.0  (CI does the rest)
version: 2

project_name: vocab

before:
  hooks:
    - go mod tidy

builds:
  - id: vocab
    main: .
    binary: vocab
    # Pure-Go SQLite (modernc.org/sqlite) means CGO is not required, so we can
    # cross-compile every target from a single runner.
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: vocab
    ids:
      - vocab
    # Lowercase, predictable names so install.sh can build them deterministically:
    #   vocab_linux_amd64.tar.gz, vocab_darwin_arm64.tar.gz, vocab_windows_amd64.zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: AndrewMeleka
    name: vocab
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
